<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 TODO List</h1>
            <p class="subtitle">Управляйте своими задачами</p>
        </header>

        <!-- Форма добавления задачи -->
        <div class="add-task">
            <input type="text" id="taskTitle" placeholder="Введите название задачи..." maxlength="255">
            <input type="text" id="taskDescription" placeholder="Описание (необязательно)...">
            <button id="addBtn">➕ Добавить</button>
        </div>

        <!-- Фильтры -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="done">Выполненные</button>
        </div>

        <!-- Статистика -->
        <div class="stats">
            <span>Всего: <strong id="totalCount">0</strong></span>
            <span>Активных: <strong id="activeCount">0</strong></span>
            <span>Выполнено: <strong id="doneCount">0</strong></span>
        </div>

        <!-- Список задач -->
        <div id="taskList" class="task-list">
            <div class="loading">Загрузка...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
